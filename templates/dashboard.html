{% extends "base.html" %}
{% block content %}

<h2>Welcome, {{user}}</h2>

<div class="card">
    <h3>Resume Analyser</h3>

        <textarea name="resume" placeholder="Paste your resume(optional)"></textarea>
            <p>OR upload file: </p>
        <input type="file" name="file">
        <input type="role" placeholder =" What do you want to become?" required>

</div>
{% if result %}
<div class="red">
    {% if result.error %}

    {% endif %}

</div>
{% endif %}

{% endblock %}
